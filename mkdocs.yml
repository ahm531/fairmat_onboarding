site_name: FAIRmat-onboarding
site_description: This NOMAD schema plugin provides a structured questionnaire designed to collect key information from newly onboarded FAIRmat Principal Investigators (PIs). It captures details on the research focus, domain expertise, and research data management practices of the PI’s group.
site_author: Ahmed Mansour

repo_url: https://github.com/FAIRmat-NFDI/fairmat_onboarding
edit_uri: ""

nav:
  - Home: index.md
  - Instructions: tutorial/tutorial.md
  - Reference: reference/references.md
plugins:
  - search
  - glightbox

theme:
  name: material
  palette:
    primary: "#2A4CDF"
    accent: "#008A67"
  font:
    text: "Titillium Web"
  logo: assets/nomad-plugin-logo.png
  favicon: assets/favicon.png
  features:
    - navigation.tabs
    - navigation.instant
    - navigation.path
    - navigation.footer
    - navigation.top
  custom_dir: docs/theme
  icon:
    repo: fontawesome/brands/github
markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - toc:
      permalink: True
  - pymdownx.arithmatex:
      generic: true
  - mkdocs-click
  - pymdownx.extra
extra:
  generator: false
  homepage: https://nomad-lab.eu
use_directory_urls: false
extra_css:
  - stylesheets/extra.css
extra_javascript:
  - create-image-sliders.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js